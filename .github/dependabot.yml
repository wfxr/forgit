version: 2

multi-ecosystem-groups:
  rumdl:
      schedule:
        interval: "monthly"
      commit-message:
        prefix: "chore(deps)"

updates:
    # combine rumdl github action and pre-commit hook in a single PR
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*rumdl*"
    multi-ecosystem-group: "rumdl"
  - package-ecosystem: "pre-commit"
    directory: "/"
    patterns:
      - "*rumdl*"
    multi-ecosystem-group: "rumdl"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    ignore:
        # already handled by the rumdl multi-ecosystem-group
      - dependency-name: "*rumdl*"
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "*rumdl*"
    groups:
      # update all pre-commit hooks in a single PR
      pre-commit:
        patterns:
          - "*"
